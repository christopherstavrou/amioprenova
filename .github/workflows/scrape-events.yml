name: Scrape Facebook Events

on:
  # Run manually from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which events to scrape'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - upcoming
          - past

  # Automatically every Monday at 08:00 UTC
  schedule:
    - cron: '0 8 * * 1'

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Determine scrape flags
        id: flags
        run: |
          MODE="${{ github.event.inputs.mode || 'all' }}"
          if [ "$MODE" = "upcoming" ]; then
            echo "flags=--upcoming" >> "$GITHUB_OUTPUT"
          elif [ "$MODE" = "past" ]; then
            echo "flags=--past" >> "$GITHUB_OUTPUT"
          else
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scraper
        run: node scripts/scrape-facebook-events.mjs ${{ steps.flags.outputs.flags }}

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/content/shows/ public/images/events/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/shows/ public/images/events/
          git commit -m "chore(events): sync Facebook events [skip ci]"
          git push
